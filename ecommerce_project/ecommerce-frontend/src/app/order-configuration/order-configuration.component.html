<div class="order-container">

  <div class="success-card">
    <h2>🎉 Order Placed Successfully!</h2>

    <p class="order-id">
      Order ID: <strong>#{{orderId}}</strong>
    </p>

    <p class="message">
      Thank you for shopping with us.
      Your order is being processed.
    </p>

    <button routerLink="/products" class="btn-back">
      Continue Shopping
    </button>

     <button routerLink="/order-history" class="btn-history">View Order History</button>
  </div>

</div>
